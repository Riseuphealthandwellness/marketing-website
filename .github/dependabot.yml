version: 2

updates:
  # GitHub Actions — keeps workflow action versions patched
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    groups:
      actions:
        patterns: ["*"]

  # Root workspace (turborepo, shared tooling)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    groups:
      patch-and-minor:
        update-types: [patch, minor]
    ignore:
      # Major version bumps reviewed manually
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  # Web app
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    groups:
      next-ecosystem:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      radix-ui:
        patterns: ["@radix-ui/*"]
      patch-and-minor:
        update-types: [patch, minor]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]

  # Sanity studio
  - package-ecosystem: npm
    directory: /apps/studio
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/New_York
    groups:
      sanity-ecosystem:
        patterns: ["sanity", "@sanity/*"]
      patch-and-minor:
        update-types: [patch, minor]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]
