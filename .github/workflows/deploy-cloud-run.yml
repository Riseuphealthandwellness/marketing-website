name: Deploy Marketing Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID || 'marketing-website-494107' }}
  GCP_REGION: ${{ vars.GCP_REGION || secrets.GCP_REGION || 'us-east4' }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || 'projects/494499026781/locations/global/workloadIdentityPools/riseup-mktg-github/providers/riseup-mktg-provider' }}
  GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT || secrets.GCP_DEPLOYER_SERVICE_ACCOUNT || vars.GCP_TERRAFORM_SERVICE_ACCOUNT || secrets.GCP_TERRAFORM_SERVICE_ACCOUNT || 'riseup-mktg-tf-deployer@marketing-website-494107.iam.gserviceaccount.com' }}
  ARTIFACT_REPOSITORY_ID: ${{ vars.ARTIFACT_REPOSITORY_ID || secrets.ARTIFACT_REPOSITORY_ID || 'riseup-web' }}
  CLOUD_RUN_SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME || secrets.CLOUD_RUN_SERVICE_NAME || 'riseup-marketing-web' }}
  RUNTIME_SERVICE_ACCOUNT_ID: ${{ vars.RUNTIME_SERVICE_ACCOUNT_ID || secrets.RUNTIME_SERVICE_ACCOUNT_ID || 'riseup-web-runtime' }}
  CONTACT_TO_EMAIL: ${{ vars.CONTACT_TO_EMAIL || 'contact@riseupwv.com' }}
  REFERRAL_TO_EMAIL: ${{ vars.REFERRAL_TO_EMAIL || 'referrals@riseupwv.com' }}
  CONTACT_FROM_EMAIL: ${{ vars.CONTACT_FROM_EMAIL || 'Rise Up Website <contact@riseupwv.com>' }}
  # Comma-separated list of allowed Google sign-in domains (e.g. riseupwv.org).
  # Leave unset in GitHub Actions variables to allow any Google account.
  AUTH_ALLOWED_DOMAINS: ${{ vars.AUTH_ALLOWED_DOMAINS || '' }}
  SANITY_STUDIO_URL: ${{ vars.SANITY_STUDIO_URL || '' }}
  AUTH_URL: ${{ vars.AUTH_URL || 'https://riseupwv.com' }}
  IMAGE_NAME: marketing-website

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest
    environment: production

    concurrency:
      group: cloud-run-marketing-website-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required workflow config
        run: |
          set -euo pipefail

          missing=0
          for var in GCP_PROJECT_ID GCP_WORKLOAD_IDENTITY_PROVIDER GCP_DEPLOYER_SERVICE_ACCOUNT; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required GitHub Actions variable/secret: ${var}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          create_credentials_file: true

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Seed Resend API key in Secret Manager
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${RESEND_API_KEY}" ]; then
            echo "::error::Missing required GitHub Actions secret: RESEND_API_KEY"
            exit 1
          fi

          if ! gcloud secrets describe RESEND_API_KEY --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud secrets create RESEND_API_KEY \
              --project="${GCP_PROJECT_ID}" \
              --replication-policy=automatic
          fi

          printf '%s' "${RESEND_API_KEY}" | gcloud secrets versions add RESEND_API_KEY \
            --project="${GCP_PROJECT_ID}" \
            --data-file=-

          gcloud secrets add-iam-policy-binding RESEND_API_KEY \
            --project="${GCP_PROJECT_ID}" \
            --member="serviceAccount:${RUNTIME_SERVICE_ACCOUNT_ID}@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet

      - name: Seed Mapbox access token in Secret Manager
        env:
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${MAPBOX_ACCESS_TOKEN}" ]; then
            echo "::error::Missing required GitHub Actions secret: MAPBOX_ACCESS_TOKEN"
            exit 1
          fi

          if ! gcloud secrets describe MAPBOX_ACCESS_TOKEN --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud secrets create MAPBOX_ACCESS_TOKEN \
              --project="${GCP_PROJECT_ID}" \
              --replication-policy=automatic
          fi

          printf '%s' "${MAPBOX_ACCESS_TOKEN}" | gcloud secrets versions add MAPBOX_ACCESS_TOKEN \
            --project="${GCP_PROJECT_ID}" \
            --data-file=-

          gcloud secrets add-iam-policy-binding MAPBOX_ACCESS_TOKEN \
            --project="${GCP_PROJECT_ID}" \
            --member="serviceAccount:${RUNTIME_SERVICE_ACCOUNT_ID}@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet

      - name: Seed AUTH_SECRET in Secret Manager
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${AUTH_SECRET}" ]; then
            echo "::error::Missing required GitHub Actions secret: AUTH_SECRET"
            exit 1
          fi

          if ! gcloud secrets describe AUTH_SECRET --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud secrets create AUTH_SECRET \
              --project="${GCP_PROJECT_ID}" \
              --replication-policy=automatic
          fi

          printf '%s' "${AUTH_SECRET}" | gcloud secrets versions add AUTH_SECRET \
            --project="${GCP_PROJECT_ID}" \
            --data-file=-

          gcloud secrets add-iam-policy-binding AUTH_SECRET \
            --project="${GCP_PROJECT_ID}" \
            --member="serviceAccount:${RUNTIME_SERVICE_ACCOUNT_ID}@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet

      - name: Seed AUTH_GOOGLE_ID in Secret Manager
        env:
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${AUTH_GOOGLE_ID}" ]; then
            echo "::error::Missing required GitHub Actions secret: AUTH_GOOGLE_ID"
            exit 1
          fi

          if ! gcloud secrets describe AUTH_GOOGLE_ID --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud secrets create AUTH_GOOGLE_ID \
              --project="${GCP_PROJECT_ID}" \
              --replication-policy=automatic
          fi

          printf '%s' "${AUTH_GOOGLE_ID}" | gcloud secrets versions add AUTH_GOOGLE_ID \
            --project="${GCP_PROJECT_ID}" \
            --data-file=-

          gcloud secrets add-iam-policy-binding AUTH_GOOGLE_ID \
            --project="${GCP_PROJECT_ID}" \
            --member="serviceAccount:${RUNTIME_SERVICE_ACCOUNT_ID}@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet

      - name: Seed AUTH_GOOGLE_SECRET in Secret Manager
        env:
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${AUTH_GOOGLE_SECRET}" ]; then
            echo "::error::Missing required GitHub Actions secret: AUTH_GOOGLE_SECRET"
            exit 1
          fi

          if ! gcloud secrets describe AUTH_GOOGLE_SECRET --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud secrets create AUTH_GOOGLE_SECRET \
              --project="${GCP_PROJECT_ID}" \
              --replication-policy=automatic
          fi

          printf '%s' "${AUTH_GOOGLE_SECRET}" | gcloud secrets versions add AUTH_GOOGLE_SECRET \
            --project="${GCP_PROJECT_ID}" \
            --data-file=-

          gcloud secrets add-iam-policy-binding AUTH_GOOGLE_SECRET \
            --project="${GCP_PROJECT_ID}" \
            --member="serviceAccount:${RUNTIME_SERVICE_ACCOUNT_ID}@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet

      - name: Set image tags
        id: image
        run: |
          set -euo pipefail

          registry="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY_ID}"
          image="${registry}/${IMAGE_NAME}"

          echo "sha_tag=${image}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "latest_tag=${image}:latest" >> "${GITHUB_OUTPUT}"

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}

      - name: Deploy new Cloud Run revision
        run: |
          set -euo pipefail

          gcloud run deploy "${CLOUD_RUN_SERVICE_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${{ steps.image.outputs.sha_tag }}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT_ID}@${GCP_PROJECT_ID}.iam.gserviceaccount.com" \
            --set-env-vars="CONTACT_TO_EMAIL=${CONTACT_TO_EMAIL},REFERRAL_TO_EMAIL=${REFERRAL_TO_EMAIL},CONTACT_FROM_EMAIL=${CONTACT_FROM_EMAIL},AUTH_TRUST_HOST=true,AUTH_URL=${AUTH_URL},AUTH_ALLOWED_DOMAINS=${AUTH_ALLOWED_DOMAINS},SANITY_STUDIO_URL=${SANITY_STUDIO_URL}" \
            --set-secrets="SANITY_REVALIDATE_SECRET=SANITY_REVALIDATE_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,MAPBOX_ACCESS_TOKEN=MAPBOX_ACCESS_TOKEN:latest,AUTH_SECRET=AUTH_SECRET:latest,AUTH_GOOGLE_ID=AUTH_GOOGLE_ID:latest,AUTH_GOOGLE_SECRET=AUTH_GOOGLE_SECRET:latest" \
            --port=3000 \
            --no-invoker-iam-check \
            --quiet
